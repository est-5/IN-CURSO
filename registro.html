<!DOCTYPE html>
<html lang="es">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | IN-CURSO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#af8862;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

}

.container{

    width:450px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.25);

}

h1{

    text-align:center;
    color:#4b2a12;
    margin-bottom:10px;

}

p{

    text-align:center;
    margin-bottom:25px;
    color:#555;

}

label{

    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;

}

input,select{

    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;

}

button{

    width:100%;
    margin-top:25px;
    padding:14px;
    background:#004b5e;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:17px;
    transition:.3s;

}

button:hover{

    background:#006b80;

}

.links{

    margin-top:20px;
    text-align:center;

}

.links a{

    color:#004b5e;
    text-decoration:none;
    font-weight:bold;

}

.links a:hover{

    text-decoration:underline;

}

.logo{

    text-align:center;
    font-size:35px;
    margin-bottom:10px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🎓

</div>

<h1>Crear Cuenta</h1>

<p>Regístrate para comenzar a aprender.</p>

<form id="registroForm">

<label>Nombre completo</label>

<input
type="text"
placeholder="Nombre completo"
required>

<label>Correo electrónico</label>

<input
type="email"
placeholder="correo@ejemplo.com"
required>

<label>Contraseña</label>

<input
type="password"
placeholder="********"
required>

<label>Confirmar contraseña</label>

<input
type="password"
placeholder="********"
required>

<label>Tipo de usuario</label>

<select required>

<option value="">Selecciona una opción</option>

<option>Alumno</option>

<option>Profesor</option>

<option>Administrador</option>

</select>

<button type="submit">

Crear cuenta

</button>

</form>

<div class="links">

<p>

¿Ya tienes una cuenta?

</p>

<a href="login.html">

Iniciar sesión

</a>

<br><br>

<a href="index.html">

← Volver al inicio

</a>

</div>

</div>

<script>

document.getElementById("registroForm").addEventListener("submit",function(e){

e.preventDefault();

alert("¡Cuenta creada correctamente!");

window.location.href="login.html";

});

</script>
<script src="js/app.js"></script>
</body>
</html>
