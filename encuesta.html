<!DOCTYPE html>
<html lang="es">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta | IN-CURSO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#af8862;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:40px;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    border-radius:15px;
    padding:35px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h2{
    color:#4b2a12;
    margin-bottom:25px;
    text-align:center;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:vertical;
}

.botones{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:35px;
    flex-wrap:wrap;
}

.boton{
    text-decoration:none;
    background:#004b5e;
    color:white;
    padding:14px 28px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-size:17px;
    transition:.3s;
}

.boton:hover{
    background:#006b80;
}

footer{
    margin-top:40px;
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

</style>

</head>

<body>

<header>

<h1>IN-CURSO</h1>

<p>Encuesta inicial del estudiante</p>

</header>

<div class="container">

<h2>Información del usuario</h2>

<form>

<label>Nombre completo</label>
<input type="text" placeholder="Escribe tu nombre" required>

<label>Edad</label>
<input type="number" required>

<label>Género</label>

<select required>

<option value="">Selecciona una opción</option>
<option>Masculino</option>
<option>Femenino</option>
<option>Otro</option>

</select>

<h2 style="margin-top:40px;">Cuestionario Inicial</h2>

<label>1. ¿Has participado en algún curso anteriormente?</label>

<select required>

<option value="">Selecciona</option>
<option>Sí</option>
<option>No</option>

</select>

<label>2. ¿Qué conocimientos tienes sobre el tema?</label>

<textarea rows="3"></textarea>

<label>3. ¿Qué esperas aprender en IN-CURSO?</label>

<textarea rows="3"></textarea>

<label>4. ¿Cómo aprendes mejor?</label>

<select>

<option>Escuchando</option>
<option>Leyendo</option>
<option>Viendo videos</option>
<option>Practicando</option>

</select>

<label>5. ¿Qué factores facilitan tu aprendizaje?</label>

<textarea rows="3"></textarea>

<label>6. ¿Te distraes fácilmente?</label>

<select>

<option>Sí</option>
<option>No</option>

</select>

<label>7. ¿Qué materia te interesa más?</label>

<select>

<option>Inglés</option>
<option>Finanzas</option>
<option>Arte</option>
<option>Geografía</option>
<option>Historia</option>

</select>

<div class="botones">

<a class="boton" href="index.html">← Regresar</a>

<button class="boton" type="submit">

Enviar encuesta

</button>

</div>

</form>

</div>

<footer>

<p>IN-CURSO © 2026</p>

</footer>
<script src="js/app.js"></script>
</body>
</html>
